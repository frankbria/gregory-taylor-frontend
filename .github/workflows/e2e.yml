name: E2E Tests

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: frankbria/gregory-taylor-backend
          path: gregory-taylor-backend
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: gregory-taylor-backend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BACKEND_DIR: ${{ github.workspace }}/gregory-taylor-backend
          NEXT_PUBLIC_API_BASE: http://localhost:4010
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_demo
          STRIPE_SECRET_KEY: sk_test_demo
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: demo-cloud
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: demo-recaptcha-key
          BETTER_AUTH_SECRET: e2e-test-secret
          MONGODB_URI: mongodb://localhost:27017/gregory-taylor-e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
